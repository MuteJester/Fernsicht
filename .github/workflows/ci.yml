# CI — runs tests, vet, and typecheck on every pull request and push to main.
#
# This is intentionally separate from the release workflows (cli-release,
# bridge-release, python-release, cli-docker). Those are tag-triggered
# and produce signed artefacts; this one is a fast, on-every-PR gate.
#
# Action SHAs match the pin style used elsewhere in .github/workflows/ —
# Dependabot (.github/dependabot.yml) watches and bumps them.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g., when a PR is force-pushed).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: CLI — go vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: go vet
        working-directory: cli
        run: go vet ./...
      - name: go test
        working-directory: cli
        run: go test ./...

  bridge:
    name: Bridge — go vet + test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version-file: bridge/go.mod
          cache-dependency-path: bridge/go.sum
      - name: go vet
        working-directory: bridge
        run: go vet ./...
      - name: go test -race
        working-directory: bridge
        run: go test -race -count=1 ./...

  python:
    name: Python SDK — pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # pin v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: publishers/python/pyproject.toml
      - name: Install package + dev deps
        working-directory: publishers/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        working-directory: publishers/python
        run: python -m pytest

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # pin v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: build (runs tsc + vite build)
        working-directory: frontend
        run: npm run build

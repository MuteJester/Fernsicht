# Build, sign, and publish a fernsicht-bridge release.
#
# Triggered by pushing a tag matching `bridge/v*` (e.g., `bridge/v0.1.0`).
# Steps mirror cli-release.yml one-for-one so the bridge and CLI
# release stories are identical from the user's perspective.
#
# The R SDK downloads these binaries lazily on first use:
#   https://github.com/MuteJester/Fernsicht/releases/download/bridge/v<VER>/fernsicht-bridge-<os>-<arch><ext>
# (see publishers/r/R/binary.R). Do NOT change the asset filenames
# without a coordinated SDK update.
#
# The CLI links the bridge in-process via bridge/pkg/embed, so it
# does NOT need these binaries. This workflow exists purely for SDKs
# (R today; future Julia/Ruby/Matlab if we pick Option B forever).
#
# Phase 0 safety rails applied: concurrency group, preflight (tests
# on tag commit), SHA-pinned actions, reproducible-build verify,
# cosign keyless signing.

name: bridge-release

on:
  push:
    tags:
      - 'bridge/v*'

concurrency:
  group: release-bridge-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  # OIDC token for cosign keyless signing.
  id-token: write
  # Create / update the GitHub release.
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Preflight — gate the release on green tests + repro build.
  # ------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      source_date_epoch: ${{ steps.vars.outputs.source_date_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: bridge/go.sum

      - name: Resolve version + reproducible timestamp
        id: vars
        run: |
          # GITHUB_REF = "refs/tags/bridge/v0.1.0".
          # tag      — FULL git tag ("bridge/v0.1.0"), for GH/SLSA APIs.
          # version  — stripped ("0.1.0"), for artifact naming + ldflags.
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#bridge/v}"
          source_date_epoch="$(git log -1 --format=%ct "$GITHUB_REF")"
          echo "version=$version"                     >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=$source_date_epoch" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"                             >> "$GITHUB_OUTPUT"

      - name: Bridge tests
        working-directory: bridge
        run: go test -race -timeout 180s ./...

      - name: Verify reproducible build
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          SOURCE_DATE_EPOCH: ${{ steps.vars.outputs.source_date_epoch }}
        run: make -C bridge verify-repro

  # ------------------------------------------------------------------
  # Release — build + sign + publish. Only runs after preflight green.
  # ------------------------------------------------------------------
  release:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      # Base64-encoded SHA256SUMS for the SLSA provenance generator.
      digests: ${{ steps.digest-hash.outputs.digests }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: bridge/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da  # pin v3.7.0
        with:
          cosign-release: 'v2.5.0'

      - name: Cross-compile + SHA256SUMS
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          SOURCE_DATE_EPOCH: ${{ needs.preflight.outputs.source_date_epoch }}
        run: make -C bridge dist

      - name: Sign artifacts (cosign keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          cd bridge/dist
          for f in fernsicht-bridge-* SHA256SUMS; do
            cosign sign-blob \
              --output-signature "$f.sig" \
              --output-certificate "$f.cert" \
              "$f"
          done
          ls -la

      - name: Verify signatures (sanity)
        run: |
          cd bridge/dist
          for f in fernsicht-bridge-* SHA256SUMS; do
            cosign verify-blob \
              --certificate "$f.cert" \
              --signature  "$f.sig" \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$f"
          done

      # Phase 6.1 — CycloneDX SBOM for the bridge source tree. Attached
      # to the GH release alongside the binaries.
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # pin v0.24.0
        with:
          path: bridge
          format: cyclonedx-json
          artifact-name: sbom-bridge-${{ needs.preflight.outputs.version }}.cdx.json
          output-file: bridge/dist/sbom-bridge-${{ needs.preflight.outputs.version }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      # Explicit enumeration — avoid `fernsicht-bridge-*` glob, which
      # would match `.sig` + `.cert` files cosign just wrote into the
      # same directory.
      - name: Compute digests for SLSA
        id: digest-hash
        run: |
          cd bridge/dist
          digests="$(sha256sum \
                       fernsicht-bridge-darwin-amd64 \
                       fernsicht-bridge-darwin-arm64 \
                       fernsicht-bridge-linux-amd64 \
                       fernsicht-bridge-linux-arm64 \
                       fernsicht-bridge-windows-amd64.exe \
                       SHA256SUMS \
                       "sbom-bridge-${{ needs.preflight.outputs.version }}.cdx.json" \
                       | base64 -w0)"
          echo "digests=$digests" >> "$GITHUB_OUTPUT"

      # Same sequential-upload pattern as cli-release.yml — avoids
      # the softprops/action-gh-release concurrent-upload 404 race.
      - name: Compose release notes
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/release-notes.md <<EOF
          # fernsicht-bridge $VERSION

          The \`fernsicht-bridge\` binary powers language SDKs that don't
          link Go directly (notably the R SDK). End users rarely
          download this directly — the SDK grabs the matching binary
          for your platform automatically on first use.

          ## Manual download + verification

          \`\`\`bash
          # Download the binary for your platform:
          curl -fsSL -o fernsicht-bridge \\
            https://github.com/$REPO/releases/download/$TAG/fernsicht-bridge-linux-amd64

          # Verify the cosign keyless signature:
          cosign verify-blob \\
            --certificate fernsicht-bridge-linux-amd64.cert \\
            --signature   fernsicht-bridge-linux-amd64.sig \\
            --certificate-identity-regexp "https://github.com/$REPO/.+" \\
            --certificate-oidc-issuer     https://token.actions.githubusercontent.com \\
            fernsicht-bridge-linux-amd64
          \`\`\`

          See \`bridge/RELEASE.md\` for full reproducibility +
          verification instructions.
          EOF

      - name: Create GitHub release (empty)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          PRERELEASE_FLAG=()
          case "$VERSION" in
            *-*) PRERELEASE_FLAG=(--prerelease) ;;
          esac
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping create"
          else
            # `--verify-tag` omitted — tag existence guaranteed by
            # the workflow's tag-push trigger. See cli-release.yml.
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "fernsicht-bridge $VERSION" \
              --notes-file /tmp/release-notes.md \
              "${PRERELEASE_FLAG[@]}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cd bridge/dist
          assets=(
            fernsicht-bridge-darwin-amd64
            fernsicht-bridge-darwin-arm64
            fernsicht-bridge-linux-amd64
            fernsicht-bridge-linux-arm64
            fernsicht-bridge-windows-amd64.exe
            SHA256SUMS
            "sbom-bridge-${VERSION}.cdx.json"
          )
          for a in "${assets[@]}"; do
            case "$a" in sbom-*) ;; *) assets+=("$a.sig" "$a.cert") ;; esac
          done
          for a in "${assets[@]}"; do
            [ -f "$a" ] || { echo "::error::missing asset $a"; exit 1; }
            attempt=1
            until gh release upload "$TAG" "$a" --clobber \
                    --repo "${{ github.repository }}"; do
              if [ $attempt -ge 3 ]; then
                echo "::error::failed to upload $a after 3 attempts"; exit 1
              fi
              attempt=$((attempt + 1)); sleep $((attempt * 2))
            done
            echo "  ✓ $a"
          done

  # ------------------------------------------------------------------
  # SLSA v1.0 provenance (level 3). Same pattern as cli-release.yml.
  # ------------------------------------------------------------------
  provenance:
    needs: [preflight, release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0  # tag pin (SHA pins rejected by SLSA self-identity check; v2.1.0 tag is protected by SLSA maintainers)
    with:
      base64-subjects: ${{ needs.release.outputs.digests }}
      upload-assets: true
      upload-tag-name: ${{ needs.preflight.outputs.tag }}
      # Non-blocking — SLSA upload-assets has a recurring bug where
      # its internal softprops step stumbles on some release states.
      # The provenance IS still generated and signed by Sigstore
      # (visible in Rekor transparency log); the failure is purely
      # on the "upload to GH release" step. For v0.1.0, cosign sigs
      # + SBOM attached to every primary asset give us equivalent
      # supply-chain confidence. Revisit once SLSA v2.2+ stabilizes.
      continue-on-error: true
      # See cli-release.yml for rationale; required even for public
      # repos due to a v2.0.0 private-detection quirk.
      private-repository: true

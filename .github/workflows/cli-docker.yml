# Build and publish the fernsicht CLI Docker image to GitHub
# Container Registry (primary) AND Docker Hub (mirror) on every CLI
# release tag.
#
# Image tags published to BOTH registries:
#   <reg>/<owner>/fernsicht:latest          (only when pushing a stable tag)
#   <reg>/<owner>/fernsicht:v<MAJOR>        (e.g. v0)
#   <reg>/<owner>/fernsicht:v<MAJOR>.<MIN>  (e.g. v0.1)
#   <reg>/<owner>/fernsicht:v<MAJOR>.<MIN>.<PATCH>
#
# Primary:  ghcr.io/<owner>/fernsicht
# Mirror:   docker.io/<dockerhub-user>/fernsicht
#
# Why two registries: GHCR is the authoritative source (no pull rate
# limit from GH runners); Docker Hub is a convenience mirror because
# many users reach for `docker pull` with no registry prefix by habit.
# Advertise GHCR as primary in docs.
#
# All tags in BOTH registries are signed with cosign keyless. Verify:
#   cosign verify <registry>/<owner>/fernsicht:latest \
#     --certificate-identity-regexp 'https://github.com/MuteJester/Fernsicht/.+' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
#
# Phase 0 (safety rails) applied: concurrency group, SHA-pinned
# actions, preflight (tests on tag commit) before publish.
# See .private/RELEASE_PIPELINE_PLAN.md §Phase 0.

name: cli-docker

on:
  push:
    tags:
      - 'cli/v*'

# Queue concurrent tag pushes — Docker Hub / GHCR pushes aren't safe
# to abort mid-run, so we wait rather than cancel.
concurrency:
  group: release-docker-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # cosign keyless signing

jobs:
  # ------------------------------------------------------------------
  # Preflight — gate the image push on green tests. Independent of
  # cli-release.yml's preflight so this workflow is self-contained.
  # ------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: |
            cli/go.sum
            bridge/go.sum

      - name: Bridge tests
        working-directory: bridge
        run: go test -race -timeout 120s ./...

      - name: CLI tests
        working-directory: cli
        run: go test -race -timeout 120s ./...

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve version + reproducible timestamp
        id: vars
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          # Same pattern as cli-release.yml for consistency:
          #   tag      — full git ref ("cli/v0.1.0"), rarely used here
          #              since Docker tags are version-based, not git-tag-
          #              based, but kept as an output for symmetry.
          #   version  — stripped ("0.1.0"), the bit we actually push as
          #              `:v<version>`.
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#cli/v}"
          source_date_epoch="$(git log -1 --format=%ct "$GITHUB_REF")"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u -d "@$source_date_epoch" +%Y-%m-%dT%H:%M:%SZ)"
          # Lower-case repo owner for ghcr (GHCR rejects uppercase).
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "commit=$commit"
            echo "build_date=$build_date"
            echo "source_date_epoch=$source_date_epoch"
            echo "owner=$owner"
            echo "ghcr_image=ghcr.io/${owner}/fernsicht"
            # Docker Hub mirror — only populated if DOCKERHUB_USERNAME
            # secret is set. Empty string → downstream steps skip the
            # mirror push. This keeps the workflow functional even in
            # forks where the user hasn't configured Docker Hub.
            if [ -n "$DOCKERHUB_USER" ]; then
              echo "dockerhub_image=docker.io/${DOCKERHUB_USER}/fernsicht"
            else
              echo "dockerhub_image="
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        # Needed for cross-arch (linux/arm64) builds on the
        # ubuntu-latest amd64 runner.
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf  # pin v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # pin v3.7.1

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # pin v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Conditional — skip if secret not set (forks, self-hosted).
        if: steps.vars.outputs.dockerhub_image != ''
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # pin v3.3.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          v="${{ steps.vars.outputs.version }}"
          ghcr="${{ steps.vars.outputs.ghcr_image }}"
          hub="${{ steps.vars.outputs.dockerhub_image }}"

          # Build the tag set for ONE image (registry+repo) at a
          # given version. Stable releases get latest + v<MAJOR> +
          # v<MAJOR>.<MIN> aliases; pre-releases (v*-rc* etc.) get
          # only the full version — they must NEVER overwrite
          # `:latest` or a floating major/minor tag.
          emit_tags() {
            local img="$1"
            if [[ "$v" == *-* ]]; then
              echo "$img:v$v"
            else
              major="${v%%.*}"
              minor="${v%.*}"
              echo "$img:v$v"
              echo "$img:v$minor"
              echo "$img:v$major"
              echo "$img:latest"
            fi
          }

          {
            emit_tags "$ghcr"
            [ -n "$hub" ] && emit_tags "$hub"
          } | paste -sd, - > .tags.txt
          tags="$(cat .tags.txt)"
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "Tags: $tags"

      - name: Build + push (multi-arch)
        id: push
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355  # pin v6.10.0
        with:
          context: .
          file: cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Pass the same build args we use locally so the image's
          # `fernsicht --version` reports a meaningful version.
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ steps.vars.outputs.commit }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            SOURCE_DATE_EPOCH=${{ steps.vars.outputs.source_date_epoch }}

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da  # pin v3.7.0
        with:
          cosign-release: 'v2.5.0'

      - name: Sign image (cosign keyless)
        env:
          COSIGN_YES: 'true'
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          # Sign every tag we just published. Cosign attaches the
          # signature to the registry alongside the image manifest.
          #
          # Intentionally NOT using `--recursive`. Recursive signing
          # writes a separate signature for EACH platform manifest
          # referenced by a multi-arch index (2 platforms × N tags =
          # 2N writes), and GHCR rate-limits rapid package-blob
          # writes — we hit `DENIED: permission_denied: write_package`
          # on the 5th sign in our first rehearsal. Signing only the
          # top-level digest (index) is the industry-standard pattern:
          # `cosign verify <image>:tag` resolves the tag to the index
          # digest and verifies against that signature regardless of
          # the platform the client pulls.
          for tag in $(echo '${{ steps.tags.outputs.tags }}' | tr ',' ' '); do
            cosign sign "${tag}@${DIGEST}"
            # Brief pause between registries to avoid GHCR's write
            # throttle when we sign 4+ tags in quick succession.
            sleep 1
          done

      - name: Verify signature (sanity)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          first_tag="$(echo '${{ steps.tags.outputs.tags }}' | cut -d, -f1)"
          cosign verify "${first_tag}@${DIGEST}" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > /dev/null
          echo "verified: $first_tag"

# Build, sign, and publish a fernsicht CLI release.
#
# Triggered by pushing a tag matching `cli/v*` (e.g., `cli/v0.1.0`).
# Steps:
#   1. Preflight — run all tests on the tag commit + assert tag matches
#      the manifest version + verify the build is reproducible.
#      Phase 0 (safety rails) of the release-pipeline plan.
#   2. Cross-compile for 5 platforms (linux/macOS/Windows × amd64/arm64).
#   3. Generate SHA256SUMS.
#   4. Sign every artifact with cosign keyless (GitHub OIDC + Sigstore).
#   5. Create a GitHub release and upload all artifacts + signatures.
#
# Reproducibility: SOURCE_DATE_EPOCH is set from the tagged commit's
# timestamp so anyone can rebuild and verify SHA256s match. The
# documented procedure lives in cli/RELEASE.md §Reproducible Builds.
#
# Cosign keyless signing uses Sigstore's Fulcio CA + the GH OIDC token.
# Verifiers DON'T need a public key — they verify against the cert's
# subject (the GH workflow identity). See cli/RELEASE.md §Verifying.
#
# SHA-pinning policy: every third-party action is pinned to a full
# commit SHA (not a floating tag). Dependabot PRs bumps. Rationale:
# tags are mutable, and an attacker who gains push access to an
# upstream action can rewrite them to exfiltrate our GH OIDC token
# or release assets. SHA pinning immunizes us — see .private/
# RELEASE_PIPELINE_PLAN.md §Phase 0.4.

name: cli-release

on:
  push:
    tags:
      - 'cli/v*'

# Queue concurrent tag pushes (don't cancel; publishes aren't safe to
# abort mid-run). Two close `git push --tags` shouldn't race on the
# same GH Release / cosign signatures / tap PRs.
concurrency:
  group: release-cli-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  # OIDC token for cosign keyless signing.
  id-token: write
  # Create / update the GitHub release.
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Preflight — the gate that separates "broken tag" from "release."
  # Runs tests, asserts tag↔manifest version agreement, verifies the
  # build is reproducible. If ANY check fails, `release` never runs
  # and nothing is published. Cheap (2–5 min); catches expensive bugs.
  # ------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      source_date_epoch: ${{ steps.vars.outputs.source_date_epoch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: |
            cli/go.sum
            bridge/go.sum

      - name: Resolve version + reproducible timestamp
        id: vars
        run: |
          # GITHUB_REF = "refs/tags/cli/v0.1.0".
          # tag      — FULL git tag name, e.g. "cli/v0.1.0". Used
          #             anywhere that talks to git/GitHub APIs (release
          #             creation, SLSA upload-tag-name).
          # version  — stripped, e.g. "0.1.0". Used for artifact
          #             naming, user-facing display, ldflags.
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#cli/v}"
          # SOURCE_DATE_EPOCH from the tagged commit's committer timestamp.
          # Anyone rebuilding with this same value gets identical binaries.
          source_date_epoch="$(git log -1 --format=%ct "$GITHUB_REF")"
          echo "version=$version"                         >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=$source_date_epoch"     >> "$GITHUB_OUTPUT"
          echo "tag=$tag"                                 >> "$GITHUB_OUTPUT"

      # Phase 0.3 — tag ↔ manifest version must match. Human forgets
      # to bump a manifest version once and we ship "fernsicht 0.1.0"
      # under a `cli/v0.1.1` tag forever (PyPI is immutable). Fail fast.
      - name: Assert tag matches manifest version
        env:
          EXPECTED: ${{ steps.vars.outputs.version }}
        run: |
          set -e
          # CLI version is embedded at link time via -ldflags, so
          # there's no manifest file to check for the CLI specifically —
          # the linker substitutes whatever `VERSION` env var we pass.
          # What we CAN check: the Dockerfile and Makefile don't
          # hard-code an older version, and the SDKs' manifest versions
          # align with what they expect.
          echo "Expected version from tag: $EXPECTED"

          # SDK manifest checks — these don't need to match the CLI tag
          # exactly (separate tag namespaces: cli/v*, py/v*, r/v*), but
          # if the SDK manifest references a specific CLI version as a
          # peer dep, that must match.
          if grep -qE '^# *CLI peer:' publishers/python/pyproject.toml; then
            PY_PEER="$(grep -E '^# *CLI peer:' publishers/python/pyproject.toml | awk '{print $NF}')"
            if [ "$PY_PEER" != "$EXPECTED" ]; then
              echo "::error::publishers/python/pyproject.toml pins CLI peer=$PY_PEER but tag demands $EXPECTED"
              exit 1
            fi
          fi
          echo "Tag/manifest assertion passed."

      # Phase 0.2 — pre-publish green-CI gate. Only test the code
      # this workflow actually ships: the CLI binary and the bridge
      # (linked in via bridge/pkg/embed). Python / R / frontend tests
      # belong to their own release workflows — a Python regression
      # shouldn't block a CLI release.
      - name: Bridge tests
        working-directory: bridge
        run: go test -race -timeout 120s ./...

      - name: CLI tests
        working-directory: cli
        run: go test -race -timeout 120s ./...

      # Phase 0.5 — reproducible-build verification. Catches
      # accidentally-non-deterministic build inputs BEFORE we publish
      # the binaries users will try to verify later.
      - name: Verify reproducible build
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          SOURCE_DATE_EPOCH: ${{ steps.vars.outputs.source_date_epoch }}
        run: make -C cli verify-repro

  # ------------------------------------------------------------------
  # Release — build + sign + publish. Only runs after preflight green.
  # ------------------------------------------------------------------
  release:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      # Base64-encoded SHA256SUMS output for the SLSA provenance
      # generator. One digest per release artifact — the provenance
      # attests to these specific bytes.
      digests: ${{ steps.digest-hash.outputs.digests }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          # Need the commit's history to derive SOURCE_DATE_EPOCH from
          # the tag's commit timestamp.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da  # pin v3.7.0
        with:
          cosign-release: 'v2.5.0'

      - name: Cross-compile + SHA256SUMS
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          SOURCE_DATE_EPOCH: ${{ needs.preflight.outputs.source_date_epoch }}
        run: make -C cli dist

      - name: Stage install scripts as release assets
        # Copy install.sh / install.ps1 into dist/ so the release-
        # creation step uploads them alongside the binaries. Users
        # then install via:
        #   curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sh
        run: |
          cp cli/install.sh  cli/dist/install.sh
          cp cli/install.ps1 cli/dist/install.ps1
          chmod +x cli/dist/install.sh
          ls -la cli/dist/

      - name: Render Brew + Scoop templates
        # Substitute SHA256s + version into the templates and stage
        # them as release assets. The tap auto-PR workflow (once
        # implemented in Phase 4 of the release-pipeline plan) will
        # consume these rendered files and open PRs to the tap repos.
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          cd cli/dist
          sha_of() { grep " $1\$" SHA256SUMS | awk '{print $1}'; }
          SHA_DARWIN_AMD64="$(sha_of fernsicht-darwin-amd64)"
          SHA_DARWIN_ARM64="$(sha_of fernsicht-darwin-arm64)"
          SHA_LINUX_AMD64="$(sha_of fernsicht-linux-amd64)"
          SHA_LINUX_ARM64="$(sha_of fernsicht-linux-arm64)"
          SHA_WINDOWS_AMD64="$(sha_of fernsicht-windows-amd64.exe)"

          for tmpl in ../dist-templates/fernsicht.rb.tmpl ../dist-templates/fernsicht.json.tmpl; do
            out="$(basename "${tmpl%.tmpl}")"
            sed \
              -e "s|__VERSION__|$VERSION|g" \
              -e "s|__TAG__|$TAG|g" \
              -e "s|__SHA_DARWIN_AMD64__|$SHA_DARWIN_AMD64|g" \
              -e "s|__SHA_DARWIN_ARM64__|$SHA_DARWIN_ARM64|g" \
              -e "s|__SHA_LINUX_AMD64__|$SHA_LINUX_AMD64|g" \
              -e "s|__SHA_LINUX_ARM64__|$SHA_LINUX_ARM64|g" \
              -e "s|__SHA_WINDOWS_AMD64__|$SHA_WINDOWS_AMD64|g" \
              "$tmpl" > "$out"
            echo "→ $out"
          done

      - name: Sign artifacts (cosign keyless)
        # Phase 4.12 — defense-in-depth for `curl install.sh | sh`:
        # the installer script itself is a release asset and gets
        # signed alongside the binaries. Users can verify the script
        # before piping it to sh. Rendered Brew/Scoop manifests also
        # get signed so the tap auto-PR workflow can verify them
        # before opening PRs.
        env:
          COSIGN_YES: 'true'
        run: |
          cd cli/dist
          # List every asset the sign loop must cover. Using an
          # explicit enumeration (not a glob) so we catch regressions:
          # if a new asset type is added to dist/ but not to this
          # list, the verify step below fails.
          ASSETS=(
            fernsicht-darwin-amd64
            fernsicht-darwin-arm64
            fernsicht-linux-amd64
            fernsicht-linux-arm64
            fernsicht-windows-amd64.exe
            SHA256SUMS
            install.sh
            install.ps1
            fernsicht.rb
            fernsicht.json
          )
          for f in "${ASSETS[@]}"; do
            [ -f "$f" ] || { echo "::error::expected asset missing: $f"; exit 1; }
            cosign sign-blob \
              --output-signature "$f.sig" \
              --output-certificate "$f.cert" \
              "$f"
          done
          ls -la

      - name: Verify signatures (sanity)
        run: |
          cd cli/dist
          # Every .sig file must have a matching .cert and verify
          # successfully. Loop over sig files (not a hand-coded list)
          # so if the sign step emits sigs we didn't enumerate, we
          # still verify them — safer fail-mode.
          for sig in *.sig; do
            f="${sig%.sig}"
            cosign verify-blob \
              --certificate "$f.cert" \
              --signature  "$sig" \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$f"
          done

      # Phase 6.1 — Generate CycloneDX SBOM for the CLI source tree.
      # Required for AGPL compliance + increasingly an enterprise
      # procurement checkbox. Uses Syft under the hood via Anchore's
      # reusable action.
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # pin v0.24.0
        with:
          path: cli
          format: cyclonedx-json
          artifact-name: sbom-cli-${{ needs.preflight.outputs.version }}.cdx.json
          output-file: cli/dist/sbom-cli-${{ needs.preflight.outputs.version }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      # Compute base64-encoded digests of the release binaries so the
      # SLSA provenance job can attest to these exact bytes. Enumerate
      # explicitly — NEVER use `fernsicht-*` here. The sign step wrote
      # `.sig` + `.cert` files into the same dir, and `fernsicht-*`
      # would glob them into the attestation subjects (bloated +
      # wrong; cosign sigs are not artifacts in their own right).
      - name: Compute digests for SLSA
        id: digest-hash
        run: |
          cd cli/dist
          digests="$(sha256sum \
                       fernsicht-darwin-amd64 \
                       fernsicht-darwin-arm64 \
                       fernsicht-linux-amd64 \
                       fernsicht-linux-arm64 \
                       fernsicht-windows-amd64.exe \
                       SHA256SUMS \
                       install.sh \
                       install.ps1 \
                       fernsicht.rb \
                       fernsicht.json \
                       "sbom-cli-${{ needs.preflight.outputs.version }}.cdx.json" \
                       | base64 -w0)"
          echo "digests=$digests" >> "$GITHUB_OUTPUT"

      # Create the release + upload assets via the `gh` CLI. We used
      # to use softprops/action-gh-release, which uploads files
      # concurrently and occasionally races the release-creation API,
      # yielding a "Not Found" 404 on one random asset (~1/30 odds
      # with our asset count). `gh release upload` is sequential and
      # retryable, which eliminates the race entirely at the cost of
      # ~10 extra seconds per release.
      - name: Compose release notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/release-notes.md <<EOF
          # fernsicht CLI $VERSION

          Wrap any command, watch progress from any browser.

          ## Install (one-liner)

          \`\`\`bash
          curl -fsSL https://github.com/$REPO/releases/latest/download/install.sh | sh
          \`\`\`

          ## Manual download

          Pick your platform below and verify the SHA256 against \`SHA256SUMS\`.

          ## Verify (cosign keyless)

          \`\`\`bash
          cosign verify-blob \\
            --certificate fernsicht-linux-amd64.cert \\
            --signature  fernsicht-linux-amd64.sig \\
            --certificate-identity-regexp "https://github.com/$REPO/.+" \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            fernsicht-linux-amd64
          \`\`\`

          See \`cli/RELEASE.md\` in the repo for full reproducibility +
          verification instructions.
          EOF
          head -5 /tmp/release-notes.md

      - name: Create GitHub release (empty)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          # Decide prerelease flag: versions containing a hyphen
          # (v0.1.0-rc1, v1.0.0-beta) are prereleases.
          PRERELEASE_FLAG=()
          case "$VERSION" in
            *-*) PRERELEASE_FLAG=(--prerelease) ;;
          esac

          # Idempotency: if a release already exists for this tag
          # (retry after a partial-failure run), `gh release create`
          # errors out. We catch that and continue to the upload step
          # — missing assets will be added via `--clobber`.
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping create, proceeding to upload"
          else
            # NOT using `--verify-tag`. The workflow is already tag-
            # triggered (only runs when GITHUB_REF is a tag ref), so
            # the tag's existence is guaranteed by the event that
            # fired us. `--verify-tag` queries GitHub's REST API
            # which can 404 briefly after a tag push due to read-
            # replica lag — a real race with no benefit for us.
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "fernsicht CLI $VERSION" \
              --notes-file /tmp/release-notes.md \
              "${PRERELEASE_FLAG[@]}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cd cli/dist
          # Enumerate the full asset set — binaries + checksums + install
          # scripts + rendered tap manifests + SBOM + every cosign sig/cert.
          # Upload sequentially with `--clobber` so retry-after-failure is
          # safe (already-uploaded files are overwritten, not duplicated).
          assets=(
            fernsicht-darwin-amd64
            fernsicht-darwin-arm64
            fernsicht-linux-amd64
            fernsicht-linux-arm64
            fernsicht-windows-amd64.exe
            SHA256SUMS
            install.sh
            install.ps1
            fernsicht.rb
            fernsicht.json
            "sbom-cli-${VERSION}.cdx.json"
          )
          # Each primary asset has a matching .sig + .cert from cosign.
          for a in "${assets[@]}"; do
            case "$a" in
              sbom-*) ;;  # SBOM has no cosign signature yet
              *) assets+=("$a.sig" "$a.cert") ;;
            esac
          done

          echo "Uploading ${#assets[@]} assets to $TAG..."
          for a in "${assets[@]}"; do
            [ -f "$a" ] || { echo "::error::missing asset $a"; exit 1; }
            # --clobber: overwrite if the asset already exists (retry
            # safety). Individual upload failures retry up to 3 times
            # via a trivial loop — gh itself doesn't retry on 5xx.
            attempt=1
            until gh release upload "$TAG" "$a" --clobber \
                    --repo "${{ github.repository }}"; do
              if [ $attempt -ge 3 ]; then
                echo "::error::failed to upload $a after 3 attempts"
                exit 1
              fi
              echo "::warning::$a upload attempt $attempt failed; retrying"
              attempt=$((attempt + 1))
              sleep $((attempt * 2))
            done
            echo "  ✓ $a"
          done

          echo "Verifying asset count..."
          expected=${#assets[@]}
          actual=$(gh release view "$TAG" --repo "${{ github.repository }}" \
                    --json assets --jq '.assets | length')
          if [ "$actual" -lt "$expected" ]; then
            echo "::error::expected $expected assets, found $actual on release"
            gh release view "$TAG" --repo "${{ github.repository }}" \
              --json assets --jq '.assets[].name'
            exit 1
          fi
          echo "Release $TAG has $actual assets (>= $expected expected)."

  # ------------------------------------------------------------------
  # SLSA v1.0 provenance (level 3) — runs AFTER the release job so it
  # can attest to the exact digests we published. The reusable workflow
  # produces `multiple.intoto.jsonl` and attaches it to the GH release.
  # Verify with slsa-verifier:
  #   slsa-verifier verify-artifact \
  #     --provenance-path multiple.intoto.jsonl \
  #     --source-uri github.com/MuteJester/Fernsicht \
  #     --source-tag cli/vX.Y.Z \
  #     fernsicht-linux-amd64
  # ------------------------------------------------------------------
  provenance:
    needs: [preflight, release]
    permissions:
      actions: read       # reusable workflow needs to read its own run
      id-token: write     # mint OIDC token for Sigstore Fulcio
      contents: write     # upload provenance to GH release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0  # tag pin (SHA pins rejected by SLSA self-identity check; v2.1.0 tag is protected by SLSA maintainers)
    with:
      base64-subjects: ${{ needs.release.outputs.digests }}
      upload-assets: true
      upload-tag-name: ${{ needs.preflight.outputs.tag }}
      # Non-blocking — SLSA upload-assets has a recurring bug where
      # its internal softprops step stumbles on some release states.
      # The provenance IS still generated and signed by Sigstore
      # (visible in Rekor transparency log); the failure is purely
      # on the "upload to GH release" step. For v0.1.0, cosign sigs
      # + SBOM attached to every primary asset give us equivalent
      # supply-chain confidence. Revisit once SLSA v2.2+ stabilizes.
      continue-on-error: true
      # Counter-intuitively named: this flag actually means "I'm
      # aware this repo name will appear in the Sigstore transparency
      # log." Required even for public repos due to a detection quirk
      # in the SLSA generator v2.0.0 — it sometimes reports the repo
      # as private and halts to protect repo-name confidentiality.
      # For a public repo the name is already public, so overriding
      # is correct + safe.
      private-repository: true

# Build, sign, and publish a fernsicht CLI release.
#
# Triggered by pushing a tag matching `cli/v*` (e.g., `cli/v0.1.0`).
# Steps:
#   1. Preflight — run all tests on the tag commit + assert tag matches
#      the manifest version + verify the build is reproducible.
#      Phase 0 (safety rails) of the release-pipeline plan.
#   2. Cross-compile for 5 platforms (linux/macOS/Windows × amd64/arm64).
#   3. Generate SHA256SUMS.
#   4. Sign every artifact with cosign keyless (GitHub OIDC + Sigstore).
#   5. Create a GitHub release and upload all artifacts + signatures.
#
# Reproducibility: SOURCE_DATE_EPOCH is set from the tagged commit's
# timestamp so anyone can rebuild and verify SHA256s match. The
# documented procedure lives in cli/RELEASE.md §Reproducible Builds.
#
# Cosign keyless signing uses Sigstore's Fulcio CA + the GH OIDC token.
# Verifiers DON'T need a public key — they verify against the cert's
# subject (the GH workflow identity). See cli/RELEASE.md §Verifying.
#
# SHA-pinning policy: every third-party action is pinned to a full
# commit SHA (not a floating tag). Dependabot PRs bumps. Rationale:
# tags are mutable, and an attacker who gains push access to an
# upstream action can rewrite them to exfiltrate our GH OIDC token
# or release assets. SHA pinning immunizes us — see .private/
# RELEASE_PIPELINE_PLAN.md §Phase 0.4.

name: cli-release

on:
  push:
    tags:
      - 'cli/v*'

# Queue concurrent tag pushes (don't cancel; publishes aren't safe to
# abort mid-run). Two close `git push --tags` shouldn't race on the
# same GH Release / cosign signatures / tap PRs.
concurrency:
  group: release-cli-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  # OIDC token for cosign keyless signing.
  id-token: write
  # Create / update the GitHub release.
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Preflight — the gate that separates "broken tag" from "release."
  # Runs tests, asserts tag↔manifest version agreement, verifies the
  # build is reproducible. If ANY check fails, `release` never runs
  # and nothing is published. Cheap (2–5 min); catches expensive bugs.
  # ------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      source_date_epoch: ${{ steps.vars.outputs.source_date_epoch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: |
            cli/go.sum
            bridge/go.sum

      - name: Resolve version + reproducible timestamp
        id: vars
        run: |
          # Tag is e.g. "cli/v0.1.0". Strip the "cli/" prefix → "v0.1.0".
          tag="${GITHUB_REF##*/cli/}"
          version="${tag#v}"
          # SOURCE_DATE_EPOCH from the tagged commit's committer timestamp.
          # Anyone rebuilding with this same value gets identical binaries.
          source_date_epoch="$(git log -1 --format=%ct "$GITHUB_REF")"
          echo "version=$version"                         >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=$source_date_epoch"     >> "$GITHUB_OUTPUT"
          echo "tag=$tag"                                 >> "$GITHUB_OUTPUT"

      # Phase 0.3 — tag ↔ manifest version must match. Human forgets
      # to bump a manifest version once and we ship "fernsicht 0.1.0"
      # under a `cli/v0.1.1` tag forever (PyPI is immutable). Fail fast.
      - name: Assert tag matches manifest version
        env:
          EXPECTED: ${{ steps.vars.outputs.version }}
        run: |
          set -e
          # CLI version is embedded at link time via -ldflags, so
          # there's no manifest file to check for the CLI specifically —
          # the linker substitutes whatever `VERSION` env var we pass.
          # What we CAN check: the Dockerfile and Makefile don't
          # hard-code an older version, and the SDKs' manifest versions
          # align with what they expect.
          echo "Expected version from tag: $EXPECTED"

          # SDK manifest checks — these don't need to match the CLI tag
          # exactly (separate tag namespaces: cli/v*, py/v*, r/v*), but
          # if the SDK manifest references a specific CLI version as a
          # peer dep, that must match.
          if grep -qE '^# *CLI peer:' publishers/python/pyproject.toml; then
            PY_PEER="$(grep -E '^# *CLI peer:' publishers/python/pyproject.toml | awk '{print $NF}')"
            if [ "$PY_PEER" != "$EXPECTED" ]; then
              echo "::error::publishers/python/pyproject.toml pins CLI peer=$PY_PEER but tag demands $EXPECTED"
              exit 1
            fi
          fi
          echo "Tag/manifest assertion passed."

      # Phase 0.2 — pre-publish green-CI gate. Don't ship from a red
      # tree. Runs the same test suite as our day-to-day CI but scoped
      # to the tag commit.
      - name: Bridge tests
        working-directory: bridge
        run: go test -race -timeout 120s ./...

      - name: CLI tests
        working-directory: cli
        run: go test -race -timeout 120s ./...

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # pin v5.6.0
        with:
          python-version: '3.12'

      - name: Python SDK tests
        working-directory: publishers/python
        run: |
          python -m pip install -e .
          python -m pip install pytest
          pytest -q tests/

      # Phase 0.5 — reproducible-build verification. Catches
      # accidentally-non-deterministic build inputs BEFORE we publish
      # the binaries users will try to verify later.
      - name: Verify reproducible build
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          SOURCE_DATE_EPOCH: ${{ steps.vars.outputs.source_date_epoch }}
        run: make -C cli verify-repro

  # ------------------------------------------------------------------
  # Release — build + sign + publish. Only runs after preflight green.
  # ------------------------------------------------------------------
  release:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # pin v4.2.2
        with:
          # Need the commit's history to derive SOURCE_DATE_EPOCH from
          # the tag's commit timestamp.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # pin v5.5.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # pin v4.1.1
        with:
          cosign-release: 'v2.5.0'

      - name: Cross-compile + SHA256SUMS
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          SOURCE_DATE_EPOCH: ${{ needs.preflight.outputs.source_date_epoch }}
        run: make -C cli dist

      - name: Stage install scripts as release assets
        # Copy install.sh / install.ps1 into dist/ so the release-
        # creation step uploads them alongside the binaries. Users
        # then install via:
        #   curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sh
        run: |
          cp cli/install.sh  cli/dist/install.sh
          cp cli/install.ps1 cli/dist/install.ps1
          chmod +x cli/dist/install.sh
          ls -la cli/dist/

      - name: Render Brew + Scoop templates
        # Substitute SHA256s + version into the templates and stage
        # them as release assets. The tap auto-PR workflow (once
        # implemented in Phase 4 of the release-pipeline plan) will
        # consume these rendered files and open PRs to the tap repos.
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          cd cli/dist
          sha_of() { grep " $1\$" SHA256SUMS | awk '{print $1}'; }
          SHA_DARWIN_AMD64="$(sha_of fernsicht-darwin-amd64)"
          SHA_DARWIN_ARM64="$(sha_of fernsicht-darwin-arm64)"
          SHA_LINUX_AMD64="$(sha_of fernsicht-linux-amd64)"
          SHA_LINUX_ARM64="$(sha_of fernsicht-linux-arm64)"
          SHA_WINDOWS_AMD64="$(sha_of fernsicht-windows-amd64.exe)"

          for tmpl in ../dist-templates/fernsicht.rb.tmpl ../dist-templates/fernsicht.json.tmpl; do
            out="$(basename "${tmpl%.tmpl}")"
            sed \
              -e "s|__VERSION__|$VERSION|g" \
              -e "s|__TAG__|$TAG|g" \
              -e "s|__SHA_DARWIN_AMD64__|$SHA_DARWIN_AMD64|g" \
              -e "s|__SHA_DARWIN_ARM64__|$SHA_DARWIN_ARM64|g" \
              -e "s|__SHA_LINUX_AMD64__|$SHA_LINUX_AMD64|g" \
              -e "s|__SHA_LINUX_ARM64__|$SHA_LINUX_ARM64|g" \
              -e "s|__SHA_WINDOWS_AMD64__|$SHA_WINDOWS_AMD64|g" \
              "$tmpl" > "$out"
            echo "→ $out"
          done

      - name: Sign artifacts (cosign keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          cd cli/dist
          for f in fernsicht-* SHA256SUMS; do
            cosign sign-blob \
              --output-signature "$f.sig" \
              --output-certificate "$f.cert" \
              "$f"
          done
          ls -la

      - name: Verify signatures (sanity)
        run: |
          cd cli/dist
          for f in fernsicht-* SHA256SUMS; do
            cosign verify-blob \
              --certificate "$f.cert" \
              --signature  "$f.sig" \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$f"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # pin v2.2.1
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: fernsicht CLI ${{ needs.preflight.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.preflight.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            # fernsicht CLI ${{ needs.preflight.outputs.version }}

            Wrap any command, watch progress from any browser.

            ## Install (one-liner)

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sh
            ```

            ## Manual download

            Pick your platform below and verify the SHA256 against `SHA256SUMS`.

            ## Verify (cosign keyless)

            ```bash
            cosign verify-blob \
              --certificate fernsicht-linux-amd64.cert \
              --signature  fernsicht-linux-amd64.sig \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              fernsicht-linux-amd64
            ```

            See `cli/RELEASE.md` in the repo for full reproducibility +
            verification instructions.
          files: |
            cli/dist/fernsicht-*
            cli/dist/SHA256SUMS
            cli/dist/install.sh
            cli/dist/install.ps1
            cli/dist/fernsicht.rb
            cli/dist/fernsicht.json
            cli/dist/*.sig
            cli/dist/*.cert
